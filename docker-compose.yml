services:
  app:
    build: .
    container_name: automatic-bluray-ripping
    # environment:
    #   - ConnectionString=${ConnectionString}
    #   - CertPath=${CertPathExact}
    #   - CertPassword=${CertPassword}
    volumes:
      - ${FileDir}:/ABR/Media
    ports:
      - ${OutputPort}:80
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    devices:
      - /dev/sr0:/dev/sr0
      - /dev/sr1:/dev/sr1
    environment:
      - PUID=1000
      - PGID=1000
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility